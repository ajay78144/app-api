<div class="form-container">

  <h2>Add Category</h2>

  <form>

    <!-- NAME -->
    <div class="form-group">
      <label>Category Name</label>
      <input type="text" placeholder="Enter category name" />
    </div>

    <!-- IMAGE -->
    <div class="form-group">
      <label>Category Image</label>
      <input type="file" />
    </div>

    <!-- BUTTON -->
    <button type="submit">Save Category</button>

  </form>

</div>
