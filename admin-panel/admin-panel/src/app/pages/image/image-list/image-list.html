<div class="page">

  <!-- 🌸 TOP BAR -->
  <div class="top-bar">

    <div>

      <h2>
        Image Gallery
      </h2>

      <p>
        Manage all mehndi design images
      </p>

    </div>

    <button
      routerLink="/add-image"
      class="upload-btn"
    >
      + Upload Image
    </button>

  </div>

  <!-- 🌸 IMAGE GRID -->
  <div class="grid">

    <!-- 🌸 CARD -->
    <div

      class="card"

      *ngFor="let item of images"
    >

      <!-- 🌸 IMAGE -->
      <div class="img-box">

        <img
          [src]="item.imageUrl"
          alt=""
        />

      </div>

      <!-- 🌸 CONTENT -->
      <div class="content">

        <!-- 🌸 CATEGORY -->
        <h4>

          Category :
          {{item.category}}

        </h4>

        <!-- 🌸 TRENDING -->
        <p>

          Trending :
          {{item.trending}}

        </p>

      </div>

      <!-- 🌸 ACTIONS -->
      <div class="actions">

        <!-- 🌸 EDIT -->
        <button

          class="edit-btn"

          (click)="editImage(item)"
        >
          Edit
        </button>

        <!-- 🌸 DELETE -->
        <button

          class="delete-btn"

          (click)="deleteImage(item._id)"
        >
          Delete
        </button>

      </div>

    </div>

  </div>

</div>
