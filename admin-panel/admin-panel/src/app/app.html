</div>


<!-- 🌸 MAIN LAYOUT -->

>

    <!-- 🌸 HEADER -->

    <!-- 🌸 CONTENT -->
    <div class="content">

      <router-outlet></router-outlet>

    </div>

  </div>

</div>
